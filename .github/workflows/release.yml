name: Release and Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Versao da release (ex: v1.0.0)"
        required: true
        type: string
      prerelease:
        description: "Marcar como pre-release"
        required: false
        default: false
        type: boolean
      generate_release_notes:
        description: "Gerar release notes automaticamente"
        required: false
        default: true
        type: boolean
      publish_luarocks:
        description: "Publicar pacote no LuaRocks"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-manual-${{ github.workflow }}-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validar versao
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          if [[ ! "$VERSION" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Versao invalida: $VERSION"
            echo "Use formato vX.Y.Z ou X.Y.Z"
            exit 1
          fi

      - name: Normalizar tag
        id: tag
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          if [[ "$VERSION" =~ ^v ]]; then
            TAG="$VERSION"
          else
            TAG="v$VERSION"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Resolver versao LuaRocks
        id: luarocks_meta
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION_NO_V="${TAG#v}"
          ROCK_VERSION="${VERSION_NO_V}-1"
          echo "version_no_v=$VERSION_NO_V" >> "$GITHUB_OUTPUT"
          echo "rock_version=$ROCK_VERSION" >> "$GITHUB_OUTPUT"

      - name: Verificar se tag ja existe
        id: tag_check
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Criar e publicar tag
        if: ${{ steps.tag_check.outputs.exists != 'true' }}
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Tag ja existente
        if: ${{ steps.tag_check.outputs.exists == 'true' }}
        run: echo "Tag ${{ steps.tag.outputs.tag }} ja existe. Workflow seguira para validar release."

      - name: Verificar se release ja existe
        id: existing_release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ steps.tag.outputs.tag }}';
            try {
              await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag
              });
              core.setOutput('exists', 'true');
            } catch (err) {
              if (err.status === 404) {
                core.setOutput('exists', 'false');
                return;
              }
              throw err;
            }

      - name: Validar secret LuaRocks
        if: ${{ inputs.publish_luarocks == true && steps.existing_release.outputs.exists != 'true' }}
        shell: bash
        env:
          LUAROCKS_API_KEY: ${{ secrets.LUAROCKS_API_KEY }}
        run: |
          if [ -z "$LUAROCKS_API_KEY" ]; then
            echo "Secret LUAROCKS_API_KEY nao configurado no repositorio."
            exit 1
          fi

      - name: Gerar pacotes da release
        if: ${{ steps.existing_release.outputs.exists != 'true' }}
        shell: bash
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          mkdir -p dist
          git archive --format=zip --output "dist/nika-${TAG}.zip" "$TAG"
          git archive --format=tar.gz --output "dist/nika-${TAG}.tar.gz" "$TAG"

      - name: Criar GitHub Release
        if: ${{ steps.existing_release.outputs.exists != 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: ${{ inputs.generate_release_notes }}
          files: |
            dist/*.zip
            dist/*.tar.gz

      - name: Instalar LuaRocks
        if: ${{ inputs.publish_luarocks == true && steps.existing_release.outputs.exists != 'true' }}
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y luarocks lua5.4

      - name: Gerar rockspec
        if: ${{ inputs.publish_luarocks == true && steps.existing_release.outputs.exists != 'true' }}
        shell: bash
        run: |
          ROCK_VERSION="${{ steps.luarocks_meta.outputs.rock_version }}"
          cat > "dist/nika-${ROCK_VERSION}.rockspec" <<EOF
          package = "nika"
          version = "${ROCK_VERSION}"
          source = {
            url = "git+https://github.com/${{ github.repository }}.git",
            tag = "${{ steps.tag.outputs.tag }}"
          }
          description = {
            summary = "Nika: framework web minimalista em Lua",
            homepage = "https://github.com/${{ github.repository }}",
            license = "BSD-3-Clause"
          }
          dependencies = {
            "lua >= 5.1"
          }
          build = {
            type = "builtin",
            modules = {
              nika = "src/nika.lua",
              nika_io = "src/nika_io.lua",
              nika_audit = "src/nika_audit.lua",
              router = "src/router.lua",
              parser = "src/parser.lua",
              sandbox = "src/sandbox.lua",
              hooks = "src/hooks.lua",
              db = "src/db.lua",
              adapter_cgi = "src/adapter_cgi.lua",
              ["hooks.security_headers"] = "hooks/security_headers.lua"
            }
          }
          EOF

      - name: Empacotar e publicar no LuaRocks
        if: ${{ inputs.publish_luarocks == true && steps.existing_release.outputs.exists != 'true' }}
        shell: bash
        env:
          LUAROCKS_API_KEY: ${{ secrets.LUAROCKS_API_KEY }}
        run: |
          ROCKSPEC_FILE="dist/nika-${{ steps.luarocks_meta.outputs.rock_version }}.rockspec"
          luarocks pack "$ROCKSPEC_FILE"
          SRC_ROCK="nika-${{ steps.luarocks_meta.outputs.rock_version }}.src.rock"
          luarocks upload --api-key="$LUAROCKS_API_KEY" "$ROCKSPEC_FILE"
          luarocks upload --api-key="$LUAROCKS_API_KEY" "$SRC_ROCK"

      - name: Release ja existente
        if: ${{ steps.existing_release.outputs.exists == 'true' }}
        run: echo "Release para a tag ${{ steps.tag.outputs.tag }} ja existe. Encerrando sem erro."
